<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Execution DnD Board</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #fffdf8;
        --panel: #ffffff;
        --text: #0f172a;
        --muted: #64748b;
        --line: #e2e8f0;
        --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        padding: 12px;
        height: 100vh;
        overflow: hidden;
        background:
          radial-gradient(circle at top left, rgba(251, 191, 36, 0.14), transparent 28%),
          radial-gradient(circle at top right, rgba(59, 130, 246, 0.12), transparent 26%),
          linear-gradient(180deg, #fffefb 0%, #f8fafc 100%);
        color: var(--text);
        font-family: Georgia, "Times New Roman", serif;
      }
      #app {
        display: flex;
        flex-direction: column;
        gap: 18px;
        height: calc(100vh - 24px);
        min-height: 0;
      }
      .top-note {
        flex: 0 0 auto;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        padding: 10px 14px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: rgba(255,255,255,0.85);
        box-shadow: var(--shadow);
        font-size: 13px;
      }
      .board {
        flex: 1 1 auto;
        min-height: 0;
        overflow: hidden;
        display: grid;
        grid-template-columns: minmax(260px, 320px) minmax(0, 1fr);
        gap: 18px;
        align-items: stretch;
      }
      .tree-pane {
        height: 100%;
        min-height: 0;
        overflow: auto;
        padding: 12px;
        border-radius: 22px;
        border: 1px solid var(--line);
        background: rgba(255,255,255,0.88);
        box-shadow: var(--shadow);
      }
      .tree-pane-title {
        font-size: 16px;
        font-weight: 700;
        margin-bottom: 10px;
      }
      .tree-scroll {
        display: flex;
        flex-direction: column;
        gap: 18px;
      }
      .board-pane {
        display: flex;
        flex-direction: column;
        gap: 18px;
        height: 100%;
        min-height: 0;
        overflow: auto;
        padding: 2px 4px 2px 2px;
        border-radius: 22px;
        border: 1px solid rgba(226, 232, 240, 0.85);
        background: rgba(255,255,255,0.3);
      }
      .section {
        padding: 14px;
        border-radius: 24px;
        border: 1px solid var(--line);
        background: linear-gradient(135deg, rgba(255,250,240,0.95), rgba(238,242,255,0.95));
        box-shadow: var(--shadow);
      }
      details.tree {
        border-radius: 20px;
      }
      details.tree > summary {
        list-style: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 10px;
        user-select: none;
      }
      details.tree > summary::-webkit-details-marker {
        display: none;
      }
      .toggle {
        width: 26px;
        height: 26px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        background: #ffffff;
        border: 1px solid var(--line);
        font-weight: 700;
        color: #334155;
        flex: 0 0 auto;
        cursor: pointer;
      }
      button.toggle {
        appearance: none;
      }
      details.tree[open] > summary .toggle::before {
        content: "−";
      }
      details.tree:not([open]) > summary .toggle::before {
        content: "+";
      }
      .section-title {
        font-size: 22px;
        font-weight: 700;
      }
      .section-meta {
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
        margin-top: 2px;
      }
      .section-body {
        margin-top: 12px;
      }
      .days {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .group {
        padding: 10px 12px;
        border-radius: 18px;
        background: rgba(255,255,255,0.35);
        border: 1px solid rgba(148, 163, 184, 0.22);
      }
      .group-title {
        font-size: 16px;
        font-weight: 700;
      }
      .group-meta {
        font-size: 12px;
        color: var(--muted);
      }
      .day {
        padding: 12px;
        border-radius: 18px;
        background: rgba(255,255,255,0.55);
        border: 1px solid rgba(148, 163, 184, 0.28);
      }
      .day-header {
        margin-bottom: 10px;
      }
      .day-title {
        font-size: 18px;
        font-weight: 700;
      }
      .day-date {
        font-size: 12px;
        color: var(--muted);
      }
      .blocks {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 12px;
      }
      .bucket {
        border-radius: 20px;
        padding: 12px;
        min-height: 160px;
        border: 1px solid var(--bucket-accent, var(--line));
        background: var(--bucket-bg, #fff);
        transition: transform 120ms ease, box-shadow 120ms ease, border-color 120ms ease;
      }
      .bucket.drag-over {
        transform: translateY(-2px);
        box-shadow: 0 14px 26px rgba(15, 23, 42, 0.12);
        border-color: #0f172a;
      }
      .bucket.non-droppable {
        border-style: dashed;
      }
      .bucket-header {
        margin-bottom: 10px;
      }
      .bucket-title {
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: var(--bucket-accent, #334155);
      }
      .bucket-subtitle {
        font-size: 12px;
        color: var(--muted);
      }
      .task-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .task {
        border-radius: 16px;
        border-left: 4px solid var(--bucket-accent, #334155);
        background: rgba(255,255,255,0.92);
        box-shadow: 0 5px 14px rgba(15, 23, 42, 0.08);
        padding: 10px 12px;
        cursor: grab;
      }
      .task.dragging {
        opacity: 0.45;
      }
      .task-title {
        font-weight: 700;
        font-size: 14px;
        margin-bottom: 2px;
      }
      .task-meta {
        font-size: 12px;
        color: var(--muted);
      }
      .task-date {
        display: inline-flex;
        margin-top: 6px;
        padding: 2px 8px;
        border-radius: 999px;
        background: rgba(148, 163, 184, 0.14);
        font-size: 11px;
        color: #475569;
      }
      .empty {
        color: var(--muted);
        font-size: 12px;
        padding: 12px 8px;
        border: 1px dashed rgba(100, 116, 139, 0.35);
        border-radius: 14px;
        background: rgba(255,255,255,0.5);
      }
      .tree-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .tree-section {
        border-left: 1px solid #dbe4ee;
        padding-left: 10px;
        margin-left: 12px;
      }
      .tree-day {
        margin-top: 6px;
      }
      .tree-drop {
        margin-top: 6px;
        padding: 7px 10px;
        border-radius: 12px;
        border: 1px dashed rgba(100, 116, 139, 0.45);
        background: rgba(255,255,255,0.72);
        font-size: 13px;
        color: #334155;
      }
      .tree-drop.drag-over {
        border-color: #0f172a;
        background: #fff7ed;
      }
      .tree-link {
        cursor: pointer;
      }
      .tree-actions {
        display: flex;
        gap: 6px;
        margin-top: 6px;
      }
      .mini-btn {
        appearance: none;
        border: 1px solid #cbd5e1;
        background: white;
        border-radius: 999px;
        min-width: 28px;
        height: 28px;
        cursor: pointer;
        color: #334155;
        font-weight: 700;
      }
      .mini-btn.danger {
        color: #b91c1c;
        border-color: #fecaca;
      }
      @media (max-width: 980px) {
        body {
          height: auto;
          overflow: auto;
        }
        #app {
          height: auto;
        }
        .board {
          grid-template-columns: 1fr;
          overflow: visible;
        }
        .tree-pane,
        .board-pane {
          height: auto;
          max-height: none;
          overflow: visible;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script>
      const laneStyles = {
        focus: { bg: "#fff7ed", accent: "#ea580c" },
        must: { bg: "#fef2f2", accent: "#dc2626" },
        prefer: { bg: "#eff6ff", accent: "#2563eb" },
        session: { bg: "#f5f3ff", accent: "#7c3aed" },
        later: { bg: "#f0fdf4", accent: "#16a34a" },
        parking: { bg: "#f8fafc", accent: "#475569" },
        planned: { bg: "#faf5ff", accent: "#9333ea" },
      };

      let latestPayload = null;
      let dragRecordId = null;

      function postMessageToStreamlit(type, data) {
        window.parent.postMessage({ isStreamlitMessage: true, type, ...data }, "*");
      }

      function setFrameHeight() {
        const desktopHeight = Math.max(720, Math.min(window.innerHeight - 24, 1040));
        const mobileHeight = document.documentElement.scrollHeight || document.body.scrollHeight || 900;
        const height = window.innerWidth <= 980 ? mobileHeight : desktopHeight;
        postMessageToStreamlit("streamlit:setFrameHeight", { height });
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function sendMove(recordId, planningBucket) {
        postMessageToStreamlit("streamlit:setComponentValue", {
          value: {
            action: "move_task",
            event_id: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
            record_id: recordId,
            planning_bucket: planningBucket
          },
          dataType: "json",
        });
      }

      function sendAction(payload) {
        postMessageToStreamlit("streamlit:setComponentValue", {
          value: {
            event_id: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
            ...payload
          },
          dataType: "json",
        });
      }

      function restoreScrollPositions() {
        const treePane = document.querySelector(".tree-pane");
        const boardPane = document.querySelector(".board-pane");
        if (treePane) treePane.scrollTop = Number(sessionStorage.getItem("execution_tree_scroll") || 0);
        if (boardPane) boardPane.scrollTop = Number(sessionStorage.getItem("execution_board_scroll") || 0);
      }

      function attachScrollPersistence() {
        const treePane = document.querySelector(".tree-pane");
        const boardPane = document.querySelector(".board-pane");
        if (treePane) {
          treePane.addEventListener("scroll", () => sessionStorage.setItem("execution_tree_scroll", String(treePane.scrollTop)));
        }
        if (boardPane) {
          boardPane.addEventListener("scroll", () => sessionStorage.setItem("execution_board_scroll", String(boardPane.scrollTop)));
        }
      }

      function attachDropTargets(app) {
        app.querySelectorAll("[data-bucket-key]").forEach(targetEl => {
          targetEl.addEventListener("dragover", event => {
            event.preventDefault();
            targetEl.classList.add("drag-over");
            event.dataTransfer.dropEffect = "move";
          });
          targetEl.addEventListener("dragleave", () => targetEl.classList.remove("drag-over"));
          targetEl.addEventListener("drop", event => {
            event.preventDefault();
            targetEl.classList.remove("drag-over");
            const recordId = dragRecordId || event.dataTransfer.getData("text/plain");
            const targetBucket = targetEl.dataset.bucketKey || "";
            if (recordId && targetBucket) {
              sendMove(recordId, targetBucket);
            }
          });
        });
      }

      function attachTreeInteractions(app) {
        app.querySelectorAll("details.tree > summary").forEach(summaryEl => {
          summaryEl.addEventListener("click", event => {
            const toggle = event.target.closest(".toggle");
            const link = event.target.closest(".tree-link");
            if (toggle) {
              event.preventDefault();
              const details = summaryEl.parentElement;
              details.open = !details.open;
              return;
            }
            if (link) {
              event.preventDefault();
              const anchorId = link.dataset.anchorTarget;
              const boardPane = document.querySelector(".board-pane");
              const target = anchorId ? document.getElementById(anchorId) : null;
              if (boardPane && target) {
                boardPane.scrollTo({ top: Math.max(0, target.offsetTop - 12), behavior: "smooth" });
              }
              return;
            }
            event.preventDefault();
          });
        });

        app.querySelectorAll("[data-add-block-day]").forEach(button => {
          button.addEventListener("click", event => {
            event.preventDefault();
            const dayKey = button.dataset.addBlockDay || "";
            const title = window.prompt("Uj blokk neve:");
            if (dayKey && title && title.trim()) {
              sendAction({ action: "add_block", day_key: dayKey, title: title.trim() });
            }
          });
        });

        app.querySelectorAll("[data-remove-block]").forEach(button => {
          button.addEventListener("click", event => {
            event.preventDefault();
            const blockKey = button.dataset.removeBlock || "";
            if (blockKey && window.confirm("Toroljuk ezt a blokkot? A tartalma aznapi Mindenkepp blokkba kerul.")) {
              sendAction({ action: "remove_block", block_key: blockKey });
            }
          });
        });

        app.querySelectorAll("[data-rename-day]").forEach(button => {
          button.addEventListener("click", event => {
            event.preventDefault();
            const dayKey = button.dataset.renameDay || "";
            const currentTitle = button.dataset.currentTitle || "";
            const title = window.prompt("Nap uj neve:", currentTitle);
            if (dayKey && title && title.trim()) {
              sendAction({ action: "rename_day", day_key: dayKey, title: title.trim() });
            }
          });
        });
      }

      function renderBoard(payload) {
        latestPayload = payload;
        const app = document.getElementById("app");
        const sections = payload.sections || [];
        const tasks = payload.tasks || [];
        const taskByBucket = new Map();
        tasks.forEach(task => {
          const bucket = task.planning_bucket || "__unscheduled__";
          if (!taskByBucket.has(bucket)) taskByBucket.set(bucket, []);
          taskByBucket.get(bucket).push(task);
        });

        const topNote = `
          <div class="top-note">
            <div>Task mozgatasa: fogd meg a kartyat es dobd egy masik blokkba.</div>
            <div>Blokkba dobas utan a task due mezot a nap datumahoz igazítjuk.</div>
          </div>
        `;

        function renderTreeBlocks(day) {
          return (day.blocks || []).map(bucket => `
            <div class="tree-drop" ${bucket.droppable === false ? `` : `data-bucket-key="${escapeHtml(bucket.drop_target_key || bucket.key)}"`}>
              <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;"><span>${escapeHtml(bucket.title)}</span>${bucket.lane === "session" ? `<button class="mini-btn danger" data-remove-block="${escapeHtml(bucket.key)}">×</button>` : ``}</div>
            </div>
          `).join("");
        }

        function renderTreeDay(day, compact = false, hideTitle = false) {
          if (compact) {
            return `
              <div class="tree-day">
                ${hideTitle ? `` : `<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;"><span class="tree-link" data-anchor-target="anchor-${escapeHtml(day.key || day.title)}" style="font-weight:700;">${escapeHtml(day.title)}</span>${day.key !== "__unscheduled__" ? `<button class="mini-btn" data-add-block-day="${escapeHtml(day.key || "")}">+</button><button class="mini-btn" data-rename-day="${escapeHtml(day.key || "")}" data-current-title="${escapeHtml(day.title || "")}">✎</button>` : ``}</div>`}
                <div class="tree-section">${renderTreeBlocks(day)}</div>
              </div>
            `;
          }
          return `
            <details class="tree tree-day" open>
              <summary>
                <button class="toggle" type="button" aria-label="Nyitas-zaras"></button>
                <span class="tree-link" data-anchor-target="anchor-${escapeHtml(day.key || day.title)}">
                  <div class="day-title" style="font-size:14px;">${escapeHtml(day.title)}</div>
                  <div class="day-date">${escapeHtml(day.date || "")}</div>
                </span>
                ${day.key !== "__unscheduled__" ? `<button class="mini-btn" data-add-block-day="${escapeHtml(day.key || "")}">+</button><button class="mini-btn" data-rename-day="${escapeHtml(day.key || "")}" data-current-title="${escapeHtml(day.title || "")}">✎</button>` : ``}
              </summary>
              <div class="tree-section">${renderTreeBlocks(day)}</div>
            </details>
          `;
        }

        function renderBoardDay(day, compact = false, hideTitle = false) {
          const blocks = (day.blocks || []).map(bucket => {
            const lane = bucket.lane || "session";
            const style = laneStyles[lane] || laneStyles.session;
            const sourceKeys = (bucket.alias_keys && bucket.alias_keys.length ? bucket.alias_keys : [bucket.key]).filter(Boolean);
            const entries = sourceKeys.flatMap(key => taskByBucket.get(key) || []).slice().sort((a, b) => {
              if (bucket.sort === "date_desc") {
                const left = a.due_at || "";
                const right = b.due_at || "";
                if (left !== right) return right.localeCompare(left);
              }
              const left = a.focus_rank == null ? 9999 : a.focus_rank;
              const right = b.focus_rank == null ? 9999 : b.focus_rank;
              return left - right;
            });
            const taskMarkup = entries.length
              ? entries.map(task => `
                <div class="task" draggable="true" data-record-id="${escapeHtml(task.record_id)}" style="--bucket-accent:${style.accent};">
                  <div class="task-title">${escapeHtml(task.title)}</div>
                  <div class="task-meta">${escapeHtml(task.project || "-")} / ${escapeHtml(task.case_name || "-")}</div>
                  ${bucket.show_due_meta && task.due_at ? `<div class="task-date">${escapeHtml(task.due_at)}</div>` : ``}
                </div>
              `).join("")
              : `<div class="empty">Ures blokk</div>`;
            return `
              <div class="bucket ${bucket.droppable === false ? `non-droppable` : ``}" ${bucket.droppable === false ? `` : `data-bucket-key="${escapeHtml(bucket.drop_target_key || bucket.key)}"`} style="--bucket-bg:${style.bg};--bucket-accent:${style.accent};">
                <div class="bucket-header">
                  <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;">
                    <div class="bucket-title">${escapeHtml(bucket.title)}</div>
                    ${bucket.lane === "session" ? `<button class="mini-btn danger" data-remove-block="${escapeHtml(bucket.key)}">×</button>` : ``}
                  </div>
                  ${hideTitle ? `` : `<div class="bucket-subtitle">${escapeHtml(day.title)}</div>`}
                </div>
                <div class="task-list">${taskMarkup}</div>
              </div>
            `;
          }).join("");
          if (compact) {
            return `
              <div class="day" id="anchor-${escapeHtml(day.key || day.title)}">
                ${hideTitle ? `` : `<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;"><div class="day-title">${escapeHtml(day.title)}</div>${day.key !== "__unscheduled__" ? `<button class="mini-btn" data-add-block-day="${escapeHtml(day.key || "")}">+</button><button class="mini-btn" data-rename-day="${escapeHtml(day.key || "")}" data-current-title="${escapeHtml(day.title || "")}">✎</button>` : ``}</div>`}
                <div class="blocks">${blocks}</div>
              </div>
            `;
          }
          return `
            <details class="tree day" open>
              <summary class="day-header" id="anchor-${escapeHtml(day.key || day.title)}">
                <button class="toggle" type="button" aria-label="Nyitas-zaras"></button>
                <span>
                  <div class="day-title">${escapeHtml(day.title)}</div>
                  <div class="day-date">${escapeHtml(day.date || "")}</div>
                </span>
                ${day.key !== "__unscheduled__" ? `<button class="mini-btn" data-add-block-day="${escapeHtml(day.key || "")}">+</button><button class="mini-btn" data-rename-day="${escapeHtml(day.key || "")}" data-current-title="${escapeHtml(day.title || "")}">✎</button>` : ``}
              </summary>
              <div class="section-body"><div class="blocks">${blocks}</div></div>
            </details>
          `;
        }

        const treeHtml = sections.map(section => {
          const isUnscheduled = section.key === "unscheduled";
          const groups = isUnscheduled
            ? [{ title: "Idopont nelkul", meta: "", days: [{ key: "__unscheduled__", title: "Idopont nelkul", date: "", blocks: [{ key: "__unscheduled__", title: "Idopont nelkul", lane: "parking" }] }] }]
            : (section.groups || []);
          const flattenSection = groups.length === 1 && (groups[0].title || "") === (section.title || "");
          const groupTreeHtml = groups.map(group => {
            const compactGroup = (group.days || []).length === 1 && (group.days[0].title || "") === (group.title || "");
            const hideDayTitle = compactGroup;
            const dayTreeHtml = (group.days || []).map(day => renderTreeDay(day, compactGroup, hideDayTitle)).join("");
            if (flattenSection) {
              return dayTreeHtml;
            }
            return `
              <details class="tree group" open>
                <summary>
                  <button class="toggle" type="button" aria-label="Nyitas-zaras"></button>
                  <span class="tree-link" data-anchor-target="anchor-group-${escapeHtml(group.key || group.title)}">
                    <div class="group-title">${escapeHtml(group.title || "")}</div>
                    <div class="group-meta">${escapeHtml(group.meta || "")}</div>
                  </span>
                </summary>
                <div class="tree-section">${dayTreeHtml}</div>
              </details>
            `;
          }).join("");
          return `
            <details class="tree" open>
              <summary>
                <button class="toggle" type="button" aria-label="Nyitas-zaras"></button>
                <span class="tree-link" data-anchor-target="anchor-section-${escapeHtml(section.key || section.title)}">
                  <div style="font-weight:700;">${escapeHtml(section.title)}</div>
                  <div class="section-meta">${escapeHtml(section.meta || "")}</div>
                </span>
              </summary>
              <div class="tree-section">${groupTreeHtml}</div>
            </details>
          `;
        }).join("");

        const boardHtml = sections.map(section => {
          const isUnscheduled = section.key === "unscheduled";
          const groups = isUnscheduled
            ? [{ title: "Idopont nelkul", meta: "", days: [{ key: "__unscheduled__", title: "Idopont nelkul", date: "", blocks: [{ key: "__unscheduled__", title: "Idopont nelkul", lane: "parking" }] }] }]
            : (section.groups || []);
          const flattenSection = groups.length === 1 && (groups[0].title || "") === (section.title || "");
          const groupsHtml = groups.map(group => {
            const compactGroup = (group.days || []).length === 1 && (group.days[0].title || "") === (group.title || "");
            const daysHtml = (group.days || []).map(day => renderBoardDay(day, compactGroup, compactGroup)).join("");
            if (flattenSection) {
              return daysHtml;
            }
            return `
              <details class="tree group" open id="anchor-group-${escapeHtml(group.key || group.title)}">
                <summary>
                  <button class="toggle" type="button" aria-label="Nyitas-zaras"></button>
                  <span>
                    <div class="group-title">${escapeHtml(group.title || "")}</div>
                    <div class="group-meta">${escapeHtml(group.meta || "")}</div>
                  </span>
                </summary>
                <div class="section-body">
                  <div class="days">${daysHtml}</div>
                </div>
              </details>
            `;
          }).join("");
          return `
            <details class="tree section" open id="anchor-section-${escapeHtml(section.key || section.title)}">
              <summary>
                <button class="toggle" type="button" aria-label="Nyitas-zaras"></button>
                <span>
                  <div class="section-title">${escapeHtml(section.title)}</div>
                  <div class="section-meta">${escapeHtml(section.meta || "")}</div>
                </span>
              </summary>
              <div class="section-body">
                <div class="days">${groupsHtml}</div>
              </div>
            </details>
          `;
        }).join("");

        app.innerHTML = topNote + `
          <div class="board">
            <aside class="tree-pane">
              <div class="tree-pane-title">Tervezesi fa</div>
              <div class="tree-scroll">${treeHtml}</div>
            </aside>
            <div class="board-pane">${boardHtml}</div>
          </div>
        `;

        app.querySelectorAll(".task").forEach(taskEl => {
          taskEl.addEventListener("dragstart", event => {
            dragRecordId = taskEl.dataset.recordId;
            taskEl.classList.add("dragging");
            event.dataTransfer.setData("text/plain", dragRecordId || "");
            event.dataTransfer.effectAllowed = "move";
          });
          taskEl.addEventListener("dragend", () => {
            dragRecordId = null;
            taskEl.classList.remove("dragging");
            app.querySelectorAll(".drag-over").forEach(node => node.classList.remove("drag-over"));
          });
        });

        attachDropTargets(app);
        attachTreeInteractions(app);
        attachScrollPersistence();
        restoreScrollPositions();

        setTimeout(setFrameHeight, 0);
      }

      window.addEventListener("message", event => {
        const message = event.data;
        if (!message || message.type !== "streamlit:render") return;
        renderBoard(message.args.payload || {});
      });

      window.addEventListener("load", () => {
        postMessageToStreamlit("streamlit:componentReady", { apiVersion: 1 });
        setFrameHeight();
      });
    </script>
  </body>
</html>
