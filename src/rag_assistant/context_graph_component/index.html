<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Context Graph</title>
    <style>
      :root {
        color-scheme: light;
        --line: #dbe4ee;
        --text: #0f172a;
        --muted: #64748b;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        padding: 12px;
        height: 100vh;
        overflow: hidden;
        background:
          radial-gradient(circle at top left, rgba(251, 191, 36, 0.12), transparent 26%),
          radial-gradient(circle at top right, rgba(59, 130, 246, 0.12), transparent 24%),
          linear-gradient(180deg, #fffefb 0%, #f8fafc 100%);
        color: var(--text);
        font-family: Georgia, "Times New Roman", serif;
      }
      #app {
        height: calc(100vh - 24px);
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .note {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 14px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: rgba(255,255,255,0.92);
        font-size: 13px;
        color: var(--muted);
      }
      .note-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .mini-btn {
        appearance: none;
        border: 1px solid #cbd5e1;
        background: white;
        border-radius: 999px;
        min-width: 34px;
        height: 30px;
        padding: 0 12px;
        cursor: pointer;
        color: #334155;
        font-weight: 700;
      }
      .error-box {
        padding: 14px 16px;
        border: 1px solid #fecaca;
        border-radius: 18px;
        background: #fff1f2;
        color: #991b1b;
        font-size: 13px;
        white-space: pre-wrap;
      }
      .shell {
        flex: 1 1 auto;
        min-height: 0;
        position: relative;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 24px;
        background: rgba(255,255,255,0.75);
      }
      .viewport {
        width: 100%;
        height: 100%;
        overflow: auto;
        position: relative;
        cursor: grab;
      }
      .viewport.dragging { cursor: grabbing; }
      .canvas-shell {
        position: relative;
        min-width: 100%;
        min-height: 100%;
      }
      .scene {
        position: absolute;
        transform-origin: top left;
      }
      .canvas {
        position: relative;
      }
      svg.edges {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        overflow: visible;
      }
      .node {
        position: absolute;
        min-width: 180px;
        max-width: 360px;
        min-height: 84px;
        padding: 10px 12px;
        border-radius: 18px;
        background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(255,255,255,0.88));
        border: 1px solid var(--accent, #cbd5e1);
        box-shadow: 0 10px 20px rgba(15, 23, 42, 0.08);
        cursor: pointer;
        overflow: hidden;
      }
      .node::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, rgba(255,255,255,0.18), var(--accent-soft, rgba(203, 213, 225, 0.24)));
        pointer-events: none;
      }
      .node > * {
        position: relative;
        z-index: 1;
      }
      .node.synthetic {
        opacity: 0.88;
      }
      .node.selected {
        box-shadow: 0 0 0 3px rgba(15, 23, 42, 0.12), 0 12px 24px rgba(15, 23, 42, 0.12);
      }
      .node.dragging {
        opacity: 0.45;
      }
      .node.drop-target {
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.22), 0 12px 24px rgba(15, 23, 42, 0.16);
      }
      .node.circle {
        border-radius: 999px;
        padding-left: 18px;
        padding-right: 18px;
      }
      .node.hex {
        clip-path: polygon(8% 0%, 92% 0%, 100% 50%, 92% 100%, 8% 100%, 0% 50%);
        padding-left: 18px;
        padding-right: 18px;
      }
      .node.arrow {
        clip-path: polygon(0 0, 84% 0, 100% 50%, 84% 100%, 0 100%);
        padding-right: 22px;
      }
      .node.note {
        clip-path: polygon(0 0, 100% 0, 100% 78%, 70% 78%, 70% 100%, 54% 78%, 0 78%);
        padding-bottom: 18px;
      }
      .node.tab {
        clip-path: polygon(0 0, 74% 0, 80% 16%, 100% 16%, 100% 100%, 0 100%);
        padding-top: 14px;
      }
      .node.diamond {
        clip-path: polygon(9% 0%, 91% 0%, 100% 50%, 91% 100%, 9% 100%, 0% 50%);
      }
      .node-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        font-weight: 700;
        font-size: 14px;
        margin-bottom: 4px;
      }
      .node-title-main {
        display: inline-flex;
        align-items: center;
        min-width: 0;
        flex-wrap: wrap;
        line-height: 1.25;
        overflow-wrap: anywhere;
      }
      .node-title-main.level-0 { font-size: 32px; }
      .node-title-main.level-1 { font-size: 27px; }
      .node-title-main.level-2 { font-size: 21px; }
      .node-title-main.level-3 { font-size: 15px; }
      .node-extra {
        margin-top: 6px;
        font-size: 13px;
        color: #0f172a;
        font-weight: 700;
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .toggle-btn {
        appearance: none;
        border: 1px solid rgba(148, 163, 184, 0.5);
        background: rgba(255,255,255,0.88);
        border-radius: 999px;
        width: 24px;
        height: 24px;
        cursor: pointer;
        color: #334155;
        font-weight: 700;
        flex: 0 0 auto;
      }
      .node-meta {
        font-size: 11px;
        color: var(--muted);
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .chip {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 2px 7px;
        border-radius: 999px;
        background: rgba(148, 163, 184, 0.14);
      }
      .shape {
        width: 12px;
        height: 12px;
        border: 1px solid rgba(15, 23, 42, 0.42);
        background: var(--accent, #cbd5e1);
        display: inline-block;
      }
      .shape.circle { border-radius: 999px; }
      .shape.diamond { transform: rotate(45deg); }
      .shape.hex { clip-path: polygon(25% 0%,75% 0%,100% 50%,75% 100%,25% 100%,0% 50%); }
      .shape.arrow { clip-path: polygon(0 18%,72% 18%,72% 0,100% 50%,72% 100%,72% 82%,0 82%); }
      .shape.note { clip-path: polygon(0 0,100% 0,100% 78%,66% 78%,66% 100%,50% 78%,0 78%); }
      .shape.tab { clip-path: polygon(0 0,78% 0,78% 20%,100% 20%,100% 100%,0 100%); }
      .edge-hierarchy {
        stroke: rgba(71, 85, 105, 0.55);
        stroke-width: 2;
        fill: none;
      }
      .edge-relation {
        stroke: rgba(96, 165, 250, 0.55);
        stroke-width: 1.6;
        fill: none;
        stroke-dasharray: 6 5;
      }
      @media (max-width: 980px) {
        body {
          height: 100vh;
          overflow: hidden;
        }
        #app {
          height: calc(100vh - 24px);
        }
        .shell {
          min-height: 540px;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script>
      const shapeByEntity = {
        organization: "circle",
        team: "hex",
        project: "square",
        case: "tab",
        task: "arrow",
        decision: "diamond",
        event: "square",
        person: "square",
        note: "note",
        source_item: "tab",
      };

      const colorByEntity = {
        organization: "#BFDBFE",
        team: "#67E8F9",
        project: "#86EFAC",
        case: "#F9A8D4",
        task: "#FDE68A",
        decision: "#FDA4AF",
        event: "#C4B5FD",
        person: "#FFF8E7",
        note: "#F5F5F4",
        source_item: "#CBD5E1",
        synthetic: "#E2E8F0",
      };

      function postMessageToStreamlit(type, data) {
        window.parent.postMessage({ isStreamlitMessage: true, type, ...data }, "*");
      }

      function setFrameHeight() {
        const desktopHeight = Math.max(680, Math.min(window.innerHeight - 28, 1080));
        const mobileHeight = Math.max(760, document.documentElement.scrollHeight || document.body.scrollHeight || 900);
        const height = window.innerWidth <= 640 ? mobileHeight : desktopHeight;
        postMessageToStreamlit("streamlit:setFrameHeight", { height });
      }

      function sendEvent(payload) {
        postMessageToStreamlit("streamlit:setComponentValue", {
          value: { event_id: `${Date.now()}-${Math.random().toString(16).slice(2)}`, ...payload },
          dataType: "json",
        });
      }

      function storageKey(suffix) {
        return `context_graph_${suffix}`;
      }

      function readNumberStorage(key, fallback) {
        const parsed = Number(localStorage.getItem(key));
        return Number.isFinite(parsed) ? parsed : fallback;
      }

      function readCollapsedState() {
        try {
          return JSON.parse(localStorage.getItem(storageKey("collapsed_nodes")) || "{}");
        } catch (_error) {
          return {};
        }
      }

      function writeCollapsedState(state) {
        localStorage.setItem(storageKey("collapsed_nodes"), JSON.stringify(state));
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function hierarchyMaps(payload) {
        const nodes = payload.nodes || [];
        const edges = payload.edges || [];
        const hierarchyEdges = edges.filter(edge => edge.kind === "hierarchy");
        const outgoing = new Map();
        const incoming = new Map();
        nodes.forEach(node => {
          outgoing.set(node.id, []);
          incoming.set(node.id, []);
        });
        hierarchyEdges.forEach(edge => {
          if (outgoing.has(edge.source)) outgoing.get(edge.source).push(edge.target);
          if (incoming.has(edge.target)) incoming.get(edge.target).push(edge.source);
        });
        return { outgoing, incoming, hierarchyEdges };
      }

      function visiblePayload(payload, collapsedState) {
        const nodes = payload.nodes || [];
        const edges = payload.edges || [];
        const { outgoing } = hierarchyMaps(payload);
        const hidden = new Set();

        function hideDescendants(nodeId) {
          (outgoing.get(nodeId) || []).forEach(childId => {
            if (hidden.has(childId)) return;
            hidden.add(childId);
            hideDescendants(childId);
          });
        }

        Object.entries(collapsedState || {}).forEach(([nodeId, collapsed]) => {
          if (collapsed) hideDescendants(nodeId);
        });

        const visibleNodeIds = new Set(nodes.map(node => node.id).filter(nodeId => !hidden.has(nodeId)));
        return {
          ...payload,
          nodes: nodes.filter(node => visibleNodeIds.has(node.id)),
          edges: edges.filter(edge => visibleNodeIds.has(edge.source) && visibleNodeIds.has(edge.target)),
        };
      }

      function computeMindmapLayout(payload) {
        const nodes = payload.nodes || [];
        const { incoming, outgoing } = hierarchyMaps(payload);

        const roots = nodes
          .filter(node => (incoming.get(node.id) || []).length === 0)
          .sort((a, b) => String(a.label || "").localeCompare(String(b.label || "")));

        const positions = new Map();
        const colGap = 120;
        const rowGap = 72;
        const marginX = 36;
        const marginY = 24;
        const levelById = new Map();
        const visited = new Set();
        const sizeById = new Map();
        const levelWidths = new Map();

        function estimateNodeSize(node) {
          const label = String(node.label || "");
          const nextBits = [node.next_step ? `🥾 ${node.next_step}` : "", node.next_step_estimate ? `⏱️ ${node.next_step_estimate}` : ""].filter(Boolean).join(" | ");
          const longest = Math.max(label.length, nextBits.length, 18);
          const width = Math.max(180, Math.min(360, 120 + longest * 6));
          const lineChars = Math.max(18, Math.floor((width - 32) / 7));
          const titleLines = Math.max(1, Math.ceil(label.length / lineChars));
          const extraLines = nextBits ? Math.max(1, Math.ceil(nextBits.length / Math.max(20, lineChars - 4))) : 0;
          const metaLines = Math.max(1, Math.ceil(((node.entity_type ? 1 : 0) + (node.status ? 1 : 0) + (node.due_at ? 1 : 0) + (node.has_note ? 1 : 0) + (node.has_web_links ? 1 : 0) + (node.has_obsidian_links ? 1 : 0)) / 3));
          const height = 66 + (titleLines - 1) * 20 + extraLines * 18 + metaLines * 16;
          return { w: width, h: Math.max(92, height) };
        }

        function sortedChildren(nodeId) {
          return (outgoing.get(nodeId) || [])
            .slice()
            .sort((leftId, rightId) => {
              const left = nodes.find(node => node.id === leftId);
              const right = nodes.find(node => node.id === rightId);
              const leftKey = `${left?.project || ""}/${left?.case_name || ""}/${left?.label || ""}`;
              const rightKey = `${right?.project || ""}/${right?.case_name || ""}/${right?.label || ""}`;
              return leftKey.localeCompare(rightKey);
            });
        }

        function assignLevels(nodeId, level) {
          const known = levelById.get(nodeId);
          if (known != null && known <= level) return;
          levelById.set(nodeId, level);
          sortedChildren(nodeId).forEach(childId => assignLevels(childId, level + 1));
        }

        roots.forEach(root => assignLevels(root.id, 0));
        nodes.forEach(node => {
          if (!levelById.has(node.id)) assignLevels(node.id, 0);
        });
        nodes.forEach(node => {
          const level = levelById.get(node.id) || 0;
          const size = estimateNodeSize(node);
          sizeById.set(node.id, size);
          levelWidths.set(level, Math.max(levelWidths.get(level) || 0, size.w));
        });

        function xForLevel(level) {
          let value = marginX;
          for (let index = 0; index < level; index += 1) {
            value += (levelWidths.get(index) || 180) + colGap;
          }
          return value;
        }

        let cursorY = marginY;
        let maxLevel = 0;

        function placeSubtree(nodeId) {
          if (visited.has(nodeId)) {
            const existing = positions.get(nodeId);
            return existing ? existing.y + existing.h / 2 : cursorY;
          }
          visited.add(nodeId);
          const level = levelById.get(nodeId) || 0;
          maxLevel = Math.max(maxLevel, level);
          const size = sizeById.get(nodeId) || { w: 180, h: 92 };
          const x = xForLevel(level);
          const children = sortedChildren(nodeId).filter(childId => !visited.has(childId));

          if (!children.length) {
            const y = cursorY;
            positions.set(nodeId, { x, y, w: size.w, h: size.h });
            cursorY += size.h + rowGap;
            return y + size.h / 2;
          }

          const centers = children.map(childId => placeSubtree(childId));
          const centerY = centers.reduce((sum, value) => sum + value, 0) / Math.max(centers.length, 1);
          const y = Math.max(marginY, centerY - size.h / 2);
          positions.set(nodeId, { x, y, w: size.w, h: size.h });
          return centerY;
        }

        roots.forEach(root => {
          placeSubtree(root.id);
          cursorY += rowGap * 0.6;
        });
        nodes.forEach(node => {
          if (!visited.has(node.id)) {
            placeSubtree(node.id);
            cursorY += rowGap * 0.6;
          }
        });

        let maxY = 0;
        positions.forEach(pos => {
          maxY = Math.max(maxY, pos.y + pos.h);
        });

        return {
          positions,
          width: Math.max(980, marginX + Array.from(levelWidths.values()).reduce((sum, width) => sum + width, 0) + (Math.max(0, maxLevel)) * colGap + 120),
          height: Math.max(720, maxY + 40),
        };
      }

      function computeRadialLayout(payload) {
        const nodes = payload.nodes || [];
        const { outgoing, incoming } = hierarchyMaps(payload);
        let centerId = payload.selected_node_id || (nodes[0] && nodes[0].id) || "";
        while (centerId && (incoming.get(centerId) || []).length) {
          centerId = incoming.get(centerId)[0];
        }

        const positions = new Map();
        const colGap = 120;
        const rowGap = 72;
        const centerX = 760;
        const centerY = 520;
        const sizeById = new Map();

        function estimateNodeSize(node) {
          const label = String(node.label || "");
          const nextBits = [node.next_step ? `🥾 ${node.next_step}` : "", node.next_step_estimate ? `⏱️ ${node.next_step_estimate}` : ""].filter(Boolean).join(" | ");
          const longest = Math.max(label.length, nextBits.length, 18);
          const width = Math.max(180, Math.min(360, 120 + longest * 6));
          const lineChars = Math.max(18, Math.floor((width - 32) / 7));
          const titleLines = Math.max(1, Math.ceil(label.length / lineChars));
          const extraLines = nextBits ? Math.max(1, Math.ceil(nextBits.length / Math.max(20, lineChars - 4))) : 0;
          const metaLines = Math.max(1, Math.ceil(((node.entity_type ? 1 : 0) + (node.status ? 1 : 0) + (node.due_at ? 1 : 0) + (node.has_note ? 1 : 0) + (node.has_web_links ? 1 : 0) + (node.has_obsidian_links ? 1 : 0)) / 3));
          const height = 66 + (titleLines - 1) * 20 + extraLines * 18 + metaLines * 16;
          return { w: width, h: Math.max(92, height) };
        }
        nodes.forEach(node => sizeById.set(node.id, estimateNodeSize(node)));

        function sortedChildren(nodeId) {
          return (outgoing.get(nodeId) || [])
            .slice()
            .sort((leftId, rightId) => {
              const left = nodes.find(node => node.id === leftId);
              const right = nodes.find(node => node.id === rightId);
              const leftKey = `${left?.project || ""}/${left?.case_name || ""}/${left?.label || ""}`;
              const rightKey = `${right?.project || ""}/${right?.case_name || ""}/${right?.label || ""}`;
              return leftKey.localeCompare(rightKey);
            });
        }

        function subtreeHeight(nodeId) {
          const size = sizeById.get(nodeId) || { w: 180, h: 92 };
          const children = sortedChildren(nodeId);
          if (!children.length) return size.h + rowGap;
          const total = children.reduce((sum, childId) => sum + subtreeHeight(childId), 0);
          return Math.max(size.h + rowGap, total);
        }

        function placeDirectional(nodeId, depth, centerYPos, direction) {
          const size = sizeById.get(nodeId) || { w: 180, h: 92 };
          const x = centerX + direction * depth * (Math.max(220, size.w) + colGap) - size.w / 2;
          const y = centerYPos - size.h / 2;
          positions.set(nodeId, { x, y, w: size.w, h: size.h });
          const children = sortedChildren(nodeId);
          if (!children.length) return;
          const heights = children.map(childId => subtreeHeight(childId));
          const totalHeight = heights.reduce((sum, value) => sum + value, 0);
          let cursor = centerYPos - totalHeight / 2;
          children.forEach((childId, index) => {
            const childCenter = cursor + heights[index] / 2;
            placeDirectional(childId, depth + 1, childCenter, direction);
            cursor += heights[index];
          });
        }

        if (centerId) {
          const centerSize = sizeById.get(centerId) || { w: 180, h: 92 };
          positions.set(centerId, { x: centerX - centerSize.w / 2, y: centerY - centerSize.h / 2, w: centerSize.w, h: centerSize.h });
          const firstLevel = sortedChildren(centerId);
          const splitAt = Math.ceil(firstLevel.length / 2);
          const rightChildren = firstLevel.slice(0, splitAt);
          const leftChildren = firstLevel.slice(splitAt);
          const sideTotalHeight = sideChildren => sideChildren.reduce((sum, childId) => sum + subtreeHeight(childId), 0);

          let rightCursor = centerY - sideTotalHeight(rightChildren) / 2;
          rightChildren.forEach(childId => {
            const height = subtreeHeight(childId);
            placeDirectional(childId, 1, rightCursor + height / 2, 1);
            rightCursor += height;
          });

          let leftCursor = centerY - sideTotalHeight(leftChildren) / 2;
          leftChildren.forEach(childId => {
            const height = subtreeHeight(childId);
            placeDirectional(childId, 1, leftCursor + height / 2, -1);
            leftCursor += height;
          });
        }

        const placed = new Set(positions.keys());
        let extraY = centerY + 220;
        nodes.filter(node => !placed.has(node.id)).forEach(node => {
          positions.set(node.id, { x: centerX + 320, y: extraY, w: nodeWidth, h: nodeHeight });
          extraY += nodeHeight + rowGap;
        });

        let minX = Infinity;
        let maxX = 0;
        let maxY = 0;
        positions.forEach(pos => {
          minX = Math.min(minX, pos.x);
          maxX = Math.max(maxX, pos.x + pos.w);
          maxY = Math.max(maxY, pos.y + pos.h);
        });

        if (minX < 40) {
          const shiftX = 40 - minX;
          positions.forEach((pos, nodeId) => {
            positions.set(nodeId, { ...pos, x: pos.x + shiftX });
          });
          maxX += shiftX;
        }

        return {
          positions,
          width: Math.max(1600, maxX + 120),
          height: Math.max(1100, maxY + 120),
        };
      }

      function computeLayout(payload) {
        if (payload.mode === "radial") return computeRadialLayout(payload);
        return computeMindmapLayout(payload);
      }

      function edgePath(source, target) {
        const leftToRight = source.x <= target.x;
        const startX = leftToRight ? source.x + source.w : source.x;
        const startY = source.y + source.h / 2;
        const endX = leftToRight ? target.x : target.x + target.w;
        const endY = target.y + target.h / 2;
        const dx = Math.max(40, Math.abs(endX - startX) * 0.45);
        const control1X = leftToRight ? startX + dx : startX - dx;
        const control2X = leftToRight ? endX - dx : endX + dx;
        return `M ${startX} ${startY} C ${control1X} ${startY}, ${control2X} ${endY}, ${endX} ${endY}`;
      }

      function fitToContent(payload, viewport, pad) {
        const layout = computeLayout(visiblePayload(payload, readCollapsedState()));
        const availableWidth = Math.max(320, viewport.clientWidth - 80);
        const availableHeight = Math.max(240, viewport.clientHeight - 80);
        const nextZoom = Math.max(0.12, Math.min(2.6, Math.min(availableWidth / Math.max(layout.width, 1), availableHeight / Math.max(layout.height, 1))));
        localStorage.setItem(storageKey("zoom"), String(Number(nextZoom.toFixed(2))));
        const left = Math.max(0, pad + (layout.width * nextZoom - viewport.clientWidth) / 2);
        const top = Math.max(0, pad + (layout.height * nextZoom - viewport.clientHeight) / 2);
        localStorage.setItem(storageKey("scroll_left"), String(left));
        localStorage.setItem(storageKey("scroll_top"), String(top));
        render(payload);
      }

      function computeFitState(payload, viewport, pad) {
        const layout = computeLayout(visiblePayload(payload, readCollapsedState()));
        const availableWidth = Math.max(320, viewport.clientWidth - 80);
        const availableHeight = Math.max(240, viewport.clientHeight - 80);
        const zoom = Math.max(0.12, Math.min(2.6, Math.min(availableWidth / Math.max(layout.width, 1), availableHeight / Math.max(layout.height, 1))));
        return {
          zoom,
          left: Math.max(0, pad + (layout.width * zoom - viewport.clientWidth) / 2),
          top: Math.max(0, pad + (layout.height * zoom - viewport.clientHeight) / 2),
        };
      }

      function centerSelectedNode(payload, viewport, layout, pad, zoom) {
        const selectedId = payload.selected_node_id || "";
        const pos = layout.positions.get(selectedId);
        if (!pos) {
          return {
            left: Math.max(0, pad + (layout.width * zoom - viewport.clientWidth) / 2),
            top: Math.max(0, pad + (layout.height * zoom - viewport.clientHeight) / 2),
          };
        }
        return {
          left: Math.max(0, pad + (pos.x + pos.w / 2) * zoom - viewport.clientWidth / 2),
          top: Math.max(0, pad + (pos.y + pos.h / 2) * zoom - viewport.clientHeight / 2),
        };
      }

      function persistViewport(viewport) {
        if (!viewport) return;
        localStorage.setItem(storageKey("scroll_left"), String(viewport.scrollLeft));
        localStorage.setItem(storageKey("scroll_top"), String(viewport.scrollTop));
      }

      function render(payload) {
        const app = document.getElementById("app");
        try {
          const collapsedState = readCollapsedState();
          const fullNodes = payload.nodes || [];
          const { outgoing } = hierarchyMaps(payload);
          const currentPayload = visiblePayload(payload, collapsedState);
          const nodes = currentPayload.nodes || [];
          const edges = currentPayload.edges || [];
          const selectedId = currentPayload.selected_node_id || "";
          const layout = computeLayout(currentPayload);
          const viewportZoom = Math.max(0.12, Math.min(3.2, readNumberStorage(storageKey("zoom"), 1)));
          const pad = 1200;

          const nodeMarkup = nodes.map((node, index) => {
            const pos = layout.positions.get(node.id) || {
              x: 36 + (index % 4) * 360,
              y: 24 + Math.floor(index / 4) * 160,
              ...(payload.nodes || []).find(item => item.id === node.id)?.size || { w: 180, h: 92 },
            };
            const entityType = node.entity_type || (node.synthetic ? "synthetic" : "note");
            const accent = colorByEntity[entityType] || colorByEntity.synthetic;
            const soft = `${accent}55`;
            const shape = shapeByEntity[entityType] || "square";
            const childCount = (outgoing.get(node.id) || []).length;
            const isCollapsed = Boolean(collapsedState[node.id]);
            const hierarchyLevel = Number(node.hierarchy_level ?? 3);
            const chips = [
              node.entity_type ? `<span class="chip">${escapeHtml(node.entity_type)}</span>` : ``,
              node.status ? `<span class="chip">${escapeHtml(node.status)}</span>` : ``,
              node.due_at ? `<span class="chip">due ${escapeHtml(node.due_at)}</span>` : ``,
              node.has_note ? `<span class="chip">🗒️</span>` : ``,
              node.has_web_links ? `<span class="chip">🔗</span>` : ``,
              node.has_obsidian_links ? `<span class="chip">🪨</span>` : ``,
            ].filter(Boolean).join("");
            return `
              <div
                class="node ${shape} ${node.synthetic ? `synthetic` : ``} ${selectedId === node.id ? `selected` : ``}"
                data-node-id="${escapeHtml(node.id)}"
                data-selectable="${node.synthetic ? `false` : `true`}"
                style="left:${pos.x}px;top:${pos.y}px;width:${pos.w}px;min-height:${pos.h}px;--accent:${accent};--accent-soft:${soft};"
              >
                <div class="node-title">
                  <span class="node-title-main level-${Math.min(3, hierarchyLevel)}"><span class="shape ${shape}" style="--accent:${accent};margin-right:8px;"></span>${node.icon ? `<span style="margin-right:6px;">${escapeHtml(node.icon)}</span>` : ``}${node.has_note ? `<span style="margin-right:6px;">🗒️</span>` : ``}${node.has_web_links ? `<span style="margin-right:6px;">🔗</span>` : ``}${node.has_obsidian_links ? `<span style="margin-right:6px;">🪨</span>` : ``}${escapeHtml(node.label)}</span>
                  <span style="display:flex;align-items:center;gap:6px;">
                    ${!node.synthetic ? `<button class="toggle-btn" type="button" data-toggle-export="${escapeHtml(node.id)}">${node.export_selected ? `◉` : `◎`}</button>` : ``}
                    ${childCount ? `<button class="toggle-btn" type="button" data-toggle-node="${escapeHtml(node.id)}">${isCollapsed ? `+` : `−`}</button>` : ``}
                  </span>
                </div>
                ${node.next_step || node.next_step_estimate ? `<div class="node-extra">${node.next_step ? `<span class="chip">🥾 ${escapeHtml(node.next_step)}</span>` : ``}${node.next_step_estimate ? `<span class="chip">⏱️ ${escapeHtml(node.next_step_estimate)}</span>` : ``}</div>` : ``}
                <div class="node-meta">${chips}</div>
              </div>
            `;
          }).join("");

          const edgeMarkup = edges.map(edge => {
            const source = layout.positions.get(edge.source);
            const target = layout.positions.get(edge.target);
            if (!source || !target) return "";
            const className = edge.kind === "relation" ? "edge-relation" : "edge-hierarchy";
            return `<path class="${className}" d="${edgePath(source, target)}"></path>`;
          }).join("");

          app.innerHTML = `
            <div class="note">
              <span>Kattints egy rekord-node-ra a jobb oldali szerkeszteshez. Zoom: Ctrl + egergorgeto. Fuggoleges gorgetes: sima gorgeto. Vizszintes gorgetes: Shift + gorgeto. Mozgatas: huzd az ures hatteret.</span>
              <div class="note-actions">
                <button class="mini-btn" data-action="fit">Center / Fit</button>
                <button class="mini-btn" data-action="focus">Focus</button>
                <button class="mini-btn" data-action="toggle-detail">Részletek</button>
                <button class="mini-btn" data-action="reset">Reset</button>
              </div>
            </div>
            <div class="shell">
              <div class="viewport">
                <div class="canvas-shell" style="width:${layout.width * viewportZoom + pad * 2}px;height:${layout.height * viewportZoom + pad * 2}px;">
                  <div class="scene" style="left:${pad}px;top:${pad}px;width:${layout.width}px;height:${layout.height}px;transform:scale(${viewportZoom});">
                    <div class="canvas" style="width:${layout.width}px;height:${layout.height}px;">
                      <svg class="edges" viewBox="0 0 ${layout.width} ${layout.height}" preserveAspectRatio="xMinYMin meet">${edgeMarkup}</svg>
                      ${nodeMarkup}
                    </div>
                  </div>
                </div>
              </div>
            </div>
          `;

          const viewport = app.querySelector(".viewport");
          let dragRecordId = null;
          app.querySelectorAll("[data-action]").forEach(button => {
            button.addEventListener("click", () => {
              const action = button.dataset.action || "";
              if (action === "fit" && viewport) {
                localStorage.setItem(storageKey("auto_fit_done"), "1");
                fitToContent(payload, viewport, pad);
              } else if (action === "focus" && viewport) {
                const currentZoom = Math.max(0.12, Math.min(3.2, readNumberStorage(storageKey("zoom"), 1)));
                const nextZoom = Math.max(currentZoom, 1.35);
                const targetCenter = centerSelectedNode(payload, viewport, layout, pad, nextZoom);
                localStorage.setItem(storageKey("zoom"), String(Number(nextZoom.toFixed(2))));
                localStorage.setItem(storageKey("scroll_left"), String(targetCenter.left));
                localStorage.setItem(storageKey("scroll_top"), String(targetCenter.top));
                localStorage.setItem(storageKey("auto_fit_done"), "1");
                render(payload);
              } else if (action === "reset") {
                localStorage.setItem(storageKey("zoom"), "1");
                localStorage.removeItem(storageKey("scroll_left"));
                localStorage.removeItem(storageKey("scroll_top"));
                localStorage.removeItem(storageKey("auto_fit_done"));
                render(payload);
              } else if (action === "toggle-detail") {
                sendEvent({ action: "toggle_detail_panel" });
              }
            });
          });
          app.querySelectorAll("[data-toggle-node]").forEach(button => {
            button.addEventListener("click", event => {
              event.preventDefault();
              event.stopPropagation();
              const nodeId = button.dataset.toggleNode || "";
              if (!nodeId) return;
              const nextState = { ...collapsedState, [nodeId]: !collapsedState[nodeId] };
              writeCollapsedState(nextState);
              render(payload);
            });
          });
          app.querySelectorAll("[data-toggle-export]").forEach(button => {
            button.addEventListener("click", event => {
              event.preventDefault();
              event.stopPropagation();
              const recordId = button.dataset.toggleExport || "";
              if (recordId) sendEvent({ action: "toggle_export", record_id: recordId });
            });
          });
          app.querySelectorAll("[data-node-id]").forEach(nodeEl => {
            nodeEl.addEventListener("click", () => {
              if (nodeEl.dataset.selectable !== "true") return;
              persistViewport(viewport);
              const recordId = nodeEl.dataset.nodeId || "";
              if (recordId) sendEvent({ action: "select_node", record_id: recordId });
            });
            if (nodeEl.dataset.selectable === "true") {
              nodeEl.setAttribute("draggable", "true");
              nodeEl.addEventListener("dragstart", event => {
                dragRecordId = nodeEl.dataset.nodeId || "";
                nodeEl.classList.add("dragging");
                event.dataTransfer.setData("text/plain", dragRecordId || "");
                event.dataTransfer.effectAllowed = "move";
                persistViewport(viewport);
              });
              nodeEl.addEventListener("dragend", () => {
                dragRecordId = null;
                nodeEl.classList.remove("dragging");
                app.querySelectorAll(".drop-target").forEach(target => target.classList.remove("drop-target"));
              });
              nodeEl.addEventListener("dragover", event => {
                const targetId = nodeEl.dataset.nodeId || "";
                if (!dragRecordId || !targetId || dragRecordId === targetId) return;
                event.preventDefault();
                nodeEl.classList.add("drop-target");
                event.dataTransfer.dropEffect = "move";
              });
              nodeEl.addEventListener("dragleave", () => nodeEl.classList.remove("drop-target"));
              nodeEl.addEventListener("drop", event => {
                const targetId = nodeEl.dataset.nodeId || "";
                const sourceId = dragRecordId || event.dataTransfer.getData("text/plain");
                nodeEl.classList.remove("drop-target");
                if (!sourceId || !targetId || sourceId === targetId) return;
                event.preventDefault();
                persistViewport(viewport);
                sendEvent({ action: "reparent_node", record_id: sourceId, target_record_id: targetId });
              });
            }
          });

          if (viewport) {
            const autoFitDone = localStorage.getItem(storageKey("auto_fit_done")) === "1";
            const incomingForceFit = payload.force_fit_token || "";
            const lastForceFit = localStorage.getItem(storageKey("force_fit_token")) || "";
            if (incomingForceFit && incomingForceFit !== lastForceFit) {
              const fitState = computeFitState(payload, viewport, pad);
              const focusZoom = Math.max(fitState.zoom, 1.35);
              const selectedCenter = centerSelectedNode(payload, viewport, layout, pad, focusZoom);
              localStorage.setItem(storageKey("zoom"), String(Number(focusZoom.toFixed(2))));
              localStorage.setItem(storageKey("scroll_left"), String(selectedCenter.left));
              localStorage.setItem(storageKey("scroll_top"), String(selectedCenter.top));
              localStorage.setItem(storageKey("auto_fit_done"), "1");
              localStorage.setItem(storageKey("force_fit_token"), incomingForceFit);
              render(payload);
              return;
            }
            if (!autoFitDone) {
              const fitState = computeFitState(payload, viewport, pad);
              localStorage.setItem(storageKey("zoom"), String(Number(fitState.zoom.toFixed(2))));
              localStorage.setItem(storageKey("scroll_left"), String(fitState.left));
              localStorage.setItem(storageKey("scroll_top"), String(fitState.top));
              localStorage.setItem(storageKey("auto_fit_done"), "1");
              render(payload);
              return;
            }
            const maxScrollLeft = Math.max(0, viewport.scrollWidth - viewport.clientWidth);
            const maxScrollTop = Math.max(0, viewport.scrollHeight - viewport.clientHeight);
            viewport.scrollLeft = Math.min(maxScrollLeft, Math.max(0, readNumberStorage(storageKey("scroll_left"), 0)));
            viewport.scrollTop = Math.min(maxScrollTop, Math.max(0, readNumberStorage(storageKey("scroll_top"), 0)));
            viewport.addEventListener("scroll", () => {
              persistViewport(viewport);
            });

            let dragging = false;
            let startX = 0;
            let startY = 0;
            let scrollLeft = 0;
            let scrollTop = 0;

            viewport.addEventListener("mousedown", event => {
              if (event.target.closest(".node")) return;
              dragging = true;
              viewport.classList.add("dragging");
              startX = event.clientX;
              startY = event.clientY;
              scrollLeft = viewport.scrollLeft;
              scrollTop = viewport.scrollTop;
            });
            window.addEventListener("mouseup", () => {
              dragging = false;
              viewport.classList.remove("dragging");
            });
            viewport.addEventListener("mousemove", event => {
              if (!dragging) return;
              event.preventDefault();
              viewport.scrollLeft = scrollLeft - (event.clientX - startX);
              viewport.scrollTop = scrollTop - (event.clientY - startY);
            });
            viewport.addEventListener("wheel", event => {
              if (event.ctrlKey) {
                event.preventDefault();
                const currentZoom = Math.max(0.12, Math.min(3.2, readNumberStorage(storageKey("zoom"), 1)));
                const nextZoom = Math.max(0.12, Math.min(3.2, currentZoom + (event.deltaY < 0 ? 0.08 : -0.08)));
                const rect = viewport.getBoundingClientRect();
                const pointerX = event.clientX - rect.left + viewport.scrollLeft;
                const pointerY = event.clientY - rect.top + viewport.scrollTop;
                const sceneX = (pointerX - pad) / currentZoom;
                const sceneY = (pointerY - pad) / currentZoom;
                localStorage.setItem(storageKey("zoom"), String(Number(nextZoom.toFixed(2))));
                localStorage.setItem(storageKey("scroll_left"), String(Math.max(0, pad + sceneX * nextZoom - (event.clientX - rect.left))));
                localStorage.setItem(storageKey("scroll_top"), String(Math.max(0, pad + sceneY * nextZoom - (event.clientY - rect.top))));
                render(payload);
                return;
              }
              if (event.shiftKey) {
                event.preventDefault();
                viewport.scrollLeft += event.deltaY;
              }
            }, { passive: false });
            viewport.addEventListener("dblclick", event => {
              if (event.target.closest(".node")) return;
              localStorage.setItem(storageKey("zoom"), "1");
              localStorage.removeItem(storageKey("scroll_left"));
              localStorage.removeItem(storageKey("scroll_top"));
              render(payload);
            });
          }

          setTimeout(setFrameHeight, 0);
        } catch (error) {
          app.innerHTML = `<div class="error-box">Context Graph hiba\n${escapeHtml(error && error.stack ? error.stack : String(error))}</div>`;
          setTimeout(setFrameHeight, 0);
        }
      }

      window.addEventListener("message", event => {
        const message = event.data;
        if (!message || message.type !== "streamlit:render") return;
        render(message.args.payload || {});
      });

      window.addEventListener("load", () => {
        postMessageToStreamlit("streamlit:componentReady", { apiVersion: 1 });
        setFrameHeight();
      });
    </script>
  </body>
</html>
